<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Streaming Linear Regression</title>
  <link rel="icon" type="image/png" href="../../files/logo.png" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    nav ul {
      list-style: none;
      display: flex;
      justify-content: center;
      background: #444;
    }
    nav ul li {
      margin: 0 15px;
    }
    nav ul li a {
      color: #fff;
      text-decoration: none;
      padding: 14px 20px;
      display: block;
    }
    nav ul li a:hover {
      background: #555;
    }
    footer {
      text-align: center;
      padding: 20px;
      background: #333;
      color: #fff;
    }
  
    nav ul { align-items: center; }
    #dark-toggle {
      background: none;
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      padding: 6px 12px;
      cursor: pointer;
      font-family: inherit;
      font-size: 14px;
      border-radius: 4px;
    }
    #dark-toggle:hover { background: rgba(255,255,255,0.15); }
    body.dark nav ul { background: #222; }
    body.dark footer { background: #111; }
  </style>
</head>
<body>
  <script>if(localStorage.getItem('dark')==='1')document.body.classList.add('dark');</script>
  <nav>
    <ul>
      <li><a href="https://piotr-marciniak.com/#about">About</a></li>
      <li><a href="https://piotr-marciniak.com/#projects">Projects</a></li>
      <li><a href="https://piotr-marciniak.com/#contact">Contact</a></li>
      <li><button id="dark-toggle" onclick="toggleDark()">Dark</button></li>
    </ul>
  </nav>
  <header class="wrap">
    <h1>Streaming linear regression</h1>
    <p>New points arrive over time; OLS estimate converges to the true line.</p>
  </header>

  <main class="wrap">
    <section class="controls">
      <button id="btnStart">Start</button>
      <button id="btnPause">Pause</button>
      <button id="btnReset">Reset</button>

      <label>
        Points/sec
        <input id="rate" type="range" min="1" max="60" value="10" />
        <span id="rateVal" class="mono">10</span>
      </label>

      <label>
        Noise (σ)
        <input id="noise" type="number" min="0" step="0.01" value="2" />
      </label>

      <label>
        True a (slope)
        <input id="trueA" type="number" step="0.1" value="2" />
      </label>

      <label>
        True b (intercept)
        <input id="trueB" type="number" step="0.1" value="1" />
      </label>
    </section>

    <section class="stats mono" id="stats"></section>

    <section class="canvasRow">
      <div class="canvasCard mainPlot">
        <canvas id="plot" width="900" height="520"></canvas>
        <div class="legend mono">
          <span class="dot dot-true"></span> true model
          <span class="dot dot-est"></span> estimated OLS model
          <span class="dot dot-pts"></span> points
        </div>
      </div>

      <div class="canvasCard fitPlot">
        <canvas id="fitPlot" width="320" height="520"></canvas>
        <div class="legend mono">
          <span class="dot dot-est-a"></span> est a
          <span class="dot dot-est-b"></span> est b
          <span class="dot dot-true-a"></span> true a
          <span class="dot dot-true-b"></span> true b
        </div>
      </div>
    </section>
  </main>

  <footer>
  <p>&copy; 2026 Piotr Marciniak. All rights reserved.</p>
</footer>

  <script src="app.js"></script>
  <script>
    function toggleDark() {
      const d = document.body.classList.toggle('dark');
      localStorage.setItem('dark', d ? '1' : '0');
      const btn = document.getElementById('dark-toggle');
      if (btn) btn.textContent = d ? 'Light' : 'Dark';
    }
    (function() {
      const btn = document.getElementById('dark-toggle');
      if (btn) btn.textContent = document.body.classList.contains('dark') ? 'Light' : 'Dark';
    })();
  </script>
</body>
</html>
