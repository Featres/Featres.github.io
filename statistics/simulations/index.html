<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Streaming Linear Regression</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="wrap">
    <h1>Streaming linear regression</h1>
    <p>New points arrive over time; OLS estimate converges to the true line.</p>
  </header>

  <main class="wrap">
    <section class="controls">
      <button id="btnStart">Start</button>
      <button id="btnPause">Pause</button>
      <button id="btnReset">Reset</button>

      <label>
        Points/sec
        <input id="rate" type="range" min="1" max="60" value="15" />
        <span id="rateVal" class="mono">15</span>
      </label>

      <label>
        Noise (σ)
        <input id="noise" type="range" min="0" max="2" step="0.01" value="0.40" />
        <span id="noiseVal" class="mono">0.40</span>
      </label>
    </section>

    <section class="stats mono" id="stats"></section>

    <section class="canvasCard">
      <canvas id="plot" width="900" height="520"></canvas>
      <div class="legend mono">
        <span class="dot dot-true"></span> true line
        <span class="dot dot-est"></span> estimated OLS
        <span class="dot dot-pts"></span> points
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
