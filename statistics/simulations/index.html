<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Streaming Linear Regression</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="wrap">
    <h1>Streaming linear regression</h1>
    <p>New points arrive over time; OLS estimate converges to the true line.</p>
  </header>

  <main class="wrap">
    <section class="controls">
      <button id="btnStart">Start</button>
      <button id="btnPause">Pause</button>
      <button id="btnReset">Reset</button>

      <label>
        Points/sec
        <input id="rate" type="range" min="1" max="60" value="10" />
        <span id="rateVal" class="mono">10</span>
      </label>

      <label>
        Noise (σ)
        <input id="noise" type="number" min="0" step="0.01" value="2" />
      </label>

      <label>
        True a (slope)
        <input id="trueA" type="number" step="0.1" value="2" />
      </label>

      <label>
        True b (intercept)
        <input id="trueB" type="number" step="0.1" value="2" />
      </label>
    </section>

    <section class="stats mono" id="stats"></section>

    <section class="canvasRow">
      <div class="canvasCard mainPlot">
        <canvas id="plot" width="900" height="520"></canvas>
        <div class="legend mono">
          <span class="dot dot-true"></span> true model
          <span class="dot dot-est"></span> estimated OLS model
          <span class="dot dot-pts"></span> points
        </div>
      </div>

      <div class="canvasCard fitPlot">
        <canvas id="fitPlot" width="320" height="520"></canvas>
        <div class="legend mono">
          <span class="dot dot-est-a"></span> est a
          <span class="dot dot-est-b"></span> est b
          <span class="dot dot-true-a"></span> true a
          <span class="dot dot-true-b"></span> true b
        </div>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
